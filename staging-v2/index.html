<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090d18">
  <title>CutCoach Staging V2</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090d18;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}
    .shell{position:fixed;inset:0;background:#090d18}
    iframe{display:block;width:100%;height:100%;border:0;background:#090d18}
    .status{position:absolute;inset:0;display:grid;place-items:center;padding:24px;text-align:center;background:#090d18;z-index:2}
    .status strong{display:block;font-size:20px;margin-bottom:8px}.status small{display:block;color:#9ca7bd;line-height:1.45}
    .badge{position:fixed;top:max(10px,env(safe-area-inset-top));right:12px;z-index:5;padding:6px 10px;border:1px solid rgba(132,255,190,.35);border-radius:999px;background:rgba(8,20,18,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:11px;font-weight:800;letter-spacing:.12em;color:#8fffc2;pointer-events:none}
  </style>
  <script src="loader.js?v=3" defer></script>
</head>
<body>
  <div class="shell">
    <div class="status" id="status"><div><strong>CutCoach Staging V2 wird geladen …</strong><small>Getrennte Testdaten. Keine Änderung an der produktiven App.</small></div></div>
    <iframe id="appFrame" title="CutCoach Staging" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-downloads allow-popups"></iframe>
    <div class="badge">STAGING V2</div>
  </div>
</body>
</html>
