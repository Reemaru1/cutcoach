name: Prepare CutCoach 7.2

on:
  push:
    branches: [agent/journal-perfection-v72]

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[v72 prepared]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Patch release and cache chain
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace(path, old, new):
              p=Path(path); text=p.read_text()
              if old not in text:
                  raise SystemExit(f'Missing pattern in {path}: {old}')
              p.write_text(text.replace(old,new))

          p=Path('index.html'); text=p.read_text()
          text=text.replace('ui-effects-v7.css?v=7.1.0','ui-effects-v7.css?v=7.2.0')
          text=text.replace('  <link rel="stylesheet" href="ui-effects-v7.css?v=7.2.0">','  <link rel="stylesheet" href="ui-effects-v7.css?v=7.2.0">\n  <link rel="stylesheet" href="journal-v72.css?v=7.2.0">')
          text=text.replace('ui-effects-v7.js?v=7.1.0','ui-effects-v7.js?v=7.2.0')
          text=text.replace('  <script src="ui-effects-v7.js?v=7.2.0" defer></script>\n  <script src="version-v7.js?v=7.1.0" defer></script>','  <script src="ui-effects-v7.js?v=7.2.0" defer></script>\n  <script src="journal-v72.js?v=7.2.0" defer></script>\n  <script src="version-v7.js?v=7.2.0" defer></script>')
          if 'journal-v72.js?v=7.2.0' not in text or 'journal-v72.css?v=7.2.0' not in text: raise SystemExit('Index patch incomplete')
          p.write_text(text)

          p=Path('runtime-manifest.js'); text=p.read_text()
          text=text.replace("version:'7.1.0'","version:'7.2.0'")
          text=text.replace("'./ui-effects-v7.css?v=7.1.0'","'./ui-effects-v7.css?v=7.2.0','./journal-v72.css?v=7.2.0'")
          text=text.replace("'./ui-effects-v7.js?v=7.1.0','./version-v7.js?v=7.1.0'","'./ui-effects-v7.js?v=7.2.0','./journal-v72.js?v=7.2.0','./version-v7.js?v=7.2.0'")
          if "version:'7.2.0'" not in text or 'journal-v72.js?v=7.2.0' not in text: raise SystemExit('Manifest patch incomplete')
          p.write_text(text)

          replace('sw.js','runtime-manifest.js?v=7.1.0','runtime-manifest.js?v=7.2.0')
          p=Path('update.html'); text=p.read_text().replace('7.1.0','7.2.0').replace('updated=710','updated=720'); p.write_text(text)
          replace('version-v7.js',"const RELEASE='7.1.0'","const RELEASE='7.2.0'")

          package=json.loads(Path('package.json').read_text())
          package['version']='7.2.0'
          package['scripts']['test']='node tests/v7-smoke.test.js && node tests/v72-smoke.test.js'
          Path('package.json').write_text(json.dumps(package,ensure_ascii=False,indent=2)+'\n')

          p=Path('tests/v7-smoke.test.js'); text=p.read_text()
          text=text.replace("'nutrition-v7.js','ui-effects-v7.js','version-v7.js'","'nutrition-v7.js','ui-effects-v7.js','journal-v72.js','version-v7.js'")
          text=text.replace('7.1.0','7.2.0').replace(r'7\.1\.0',r'7\.2\.0').replace('updated=710','updated=720')
          text=text.replace("['ui-effects-v7.js','ui-effects-v7.css','version-v7.js']","['ui-effects-v7.js','ui-effects-v7.css','journal-v72.js','journal-v72.css','version-v7.js']")
          text=text.replace("console.log('CutCoach 7.1 smoke test: ok')","console.log('CutCoach 7.2 compatibility smoke test: ok')")
          p.write_text(text)

          p=Path('.github/workflows/cutcoach-v7-checks.yml'); text=p.read_text().replace('agent/coach-impulse-v71','agent/journal-perfection-v72'); p.write_text(text)
          PY
      - name: Install test dependency
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Validate prepared release
        run: |
          npm run check:syntax
          npm test
      - name: Commit prepared release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html runtime-manifest.js sw.js update.html version-v7.js package.json package-lock.json tests/v7-smoke.test.js .github/workflows/cutcoach-v7-checks.yml
          git commit -m "chore: finalize CutCoach 7.2 release [v72 prepared]"
          git push