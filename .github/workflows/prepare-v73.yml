name: Prepare CutCoach 7.3

on:
  push:
    branches: [agent/german-everyday-catalog-v73]

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[v73 prepared]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Patch 7.3 integration and release chain
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace(path, old, new):
              p=Path(path); text=p.read_text()
              if old not in text:
                  raise SystemExit(f'Missing pattern in {path}: {old[:120]}')
              p.write_text(text.replace(old,new))

          p=Path('index.html'); text=p.read_text()
          text=text.replace(
              '  <link rel="stylesheet" href="nutrition-v7.css?v=7.0.0">',
              '  <link rel="stylesheet" href="nutrition-v7.css?v=7.0.0">\n  <link rel="stylesheet" href="nutrition-v73.css?v=7.3.0">'
          )
          text=text.replace(
              '  <script src="food-catalog.js?v=7.0.0" defer></script>',
              '  <script src="food-catalog.js?v=7.0.0" defer></script>\n  <script src="everyday-catalog-v73.js?v=7.3.0" defer></script>'
          )
          text=text.replace(
              '  <script src="nutrition-v7.js?v=7.0.0" defer></script>',
              '  <script src="nutrition-v7.js?v=7.0.0" defer></script>\n  <script src="nutrition-v73.js?v=7.3.0" defer></script>'
          )
          text=text.replace('version-v7.js?v=7.1.0','version-v7.js?v=7.3.0')
          for asset in ['everyday-catalog-v73.js?v=7.3.0','nutrition-v73.js?v=7.3.0','nutrition-v73.css?v=7.3.0']:
              if asset not in text: raise SystemExit(f'Index missing {asset}')
          p.write_text(text)

          p=Path('nutrition.js'); text=p.read_text()
          old="""  function searchMeta(item){
              if(SEARCH_META.has(item))return SEARCH_META.get(item);
              const name=normalized(item.name),meta={name,compact:compactNormalized(item.name),words:name.split(/\\s+/).filter(Boolean),barcode:normalized(item.barcode)};SEARCH_META.set(item,meta);return meta;
            }"""
          new="""  function searchMeta(item){
              if(SEARCH_META.has(item))return SEARCH_META.get(item);
              const name=normalized(item.name),nameCompact=compactNormalized(item.name),aliases=(Array.isArray(item.aliases)?item.aliases:[item.aliases]).filter(Boolean).map(normalized),search=[name,...aliases].join(' '),meta={name,nameCompact,aliases,search,compact:compactNormalized(search),words:search.split(/\\s+/).filter(Boolean),barcode:normalized(item.barcode)};SEARCH_META.set(item,meta);return meta;
            }"""
          if old not in text: raise SystemExit('nutrition.js searchMeta pattern missing')
          text=text.replace(old,new)
          old="""  function searchScore(item,query,routine={score:0}){
              const meta=searchMeta(item),compactQuery=compactNormalized(query),tokens=query.split(/\\s+/).filter(Boolean);
              if(!tokens.every(token=>meta.name.includes(token)||meta.compact.includes(compactNormalized(token))||meta.barcode.includes(token)||fuzzyMatch(compactNormalized(token),meta)))return null;
              let score=0;if(meta.name===query||meta.compact===compactQuery)score+=1000;else if(meta.name.startsWith(query)||meta.compact.startsWith(compactQuery))score+=600;else if(meta.words.some(word=>word.startsWith(query)))score+=350;
              for(const token of tokens){if(meta.words.some(word=>word.startsWith(token)))score+=80;if(meta.barcode===token)score+=900;if(!meta.name.includes(token)&&!meta.compact.includes(compactNormalized(token))&&fuzzyMatch(compactNormalized(token),meta))score+=35}
              const rank=featuredRank(item);return score+Number(Boolean(item.favorite))*60+Math.min(100,Number(item.uses)||0)+Math.min(220,routine.score*3)+(rank?Math.max(20,180-rank*5):0)+Number(!item.catalog)*25;
            }"""
          new="""  function searchScore(item,query,routine={score:0}){
              const meta=searchMeta(item),compactQuery=compactNormalized(query),tokens=query.split(/\\s+/).filter(Boolean);
              if(!tokens.every(token=>meta.search.includes(token)||meta.compact.includes(compactNormalized(token))||meta.barcode.includes(token)||fuzzyMatch(compactNormalized(token),meta)))return null;
              let score=0;if(meta.name===query||meta.nameCompact===compactQuery)score+=1000;else if(meta.aliases.some(alias=>alias===query||compactNormalized(alias)===compactQuery))score+=900;else if(meta.name.startsWith(query)||meta.nameCompact.startsWith(compactQuery))score+=600;else if(meta.words.some(word=>word.startsWith(query)))score+=350;
              for(const token of tokens){if(meta.words.some(word=>word.startsWith(token)))score+=80;if(meta.barcode===token)score+=900;if(!meta.search.includes(token)&&!meta.compact.includes(compactNormalized(token))&&fuzzyMatch(compactNormalized(token),meta))score+=35}
              const rank=featuredRank(item);return score+Number(Boolean(item.favorite))*60+Math.min(100,Number(item.uses)||0)+Math.min(220,routine.score*3)+(rank?Math.max(20,180-rank*5):0)+Number(!item.catalog)*25;
            }"""
          if old not in text: raise SystemExit('nutrition.js searchScore pattern missing')
          text=text.replace(old,new)
          text=text.replace("scope.textContent=query?'Bibliothek & BLS 4.0'","scope.textContent=query?'Bibliothek, BLS & Alltagsgerichte'")
          text=text.replace("item.source==='off'?'<i class=\"nutrition-source product\" aria-label=\"Quelle Open Food Facts\">Produkt</i>':''",
                            "item.source==='off'?'<i class=\"nutrition-source product\" aria-label=\"Quelle Open Food Facts\">Produkt</i>':item.source==='cutcoach'?'<i class=\"nutrition-source standard\" aria-label=\"CutCoach Standardgericht aus BLS-Zutaten\">Standard</i>':''")
          text=text.replace("/brot|toast|brotchen/.test(name)","/brot|toast|brotchen|semmel|brezel|breze|doner|durum|kebab|lahmacun/.test(name)")
          p.write_text(text)

          p=Path('nutrition-v7.js'); text=p.read_text()
          text=text.replace(
              "function itemSource(item){return item?.source==='bls'?'BLS 4.0':item?.source==='off'?'Open Food Facts':item?.kind==='recipe'?'Eigenes Rezept':'Eigener Eintrag'}",
              "function itemSource(item){return item?.source==='bls'?'BLS 4.0':item?.source==='off'?'Open Food Facts':item?.source==='cutcoach'?'CutCoach Standardgericht · aus BLS 4.0 berechnet':item?.kind==='recipe'?'Eigenes Rezept':'Eigener Eintrag'}"
          )
          old="const score=item=>{const name=normalize(item.name);if(tokens.length&&!tokens.every(token=>name.includes(token)))return -1;let value=0;if(name===q)value+=1000;else if(name.startsWith(q))value+=500;for(const token of tokens)if(name.split(' ').some(word=>word.startsWith(token)))value+=80;value+=Number(Boolean(item.favorite))*100+Math.min(80,Number(item.uses)||0);return value};"
          new="const score=item=>{const name=normalize(item.name),aliases=normalize((Array.isArray(item.aliases)?item.aliases:[item.aliases]).filter(Boolean).join(' ')),search=`${name} ${aliases}`.trim();if(tokens.length&&!tokens.every(token=>search.includes(token)))return -1;let value=0;if(name===q)value+=1000;else if(aliases.split(/\\s+/).includes(q))value+=850;else if(name.startsWith(q))value+=500;for(const token of tokens)if(search.split(' ').some(word=>word.startsWith(token)))value+=80;value+=Number(Boolean(item.favorite))*100+Math.min(80,Number(item.uses)||0);return value};"
          if old not in text: raise SystemExit('nutrition-v7 ingredient score pattern missing')
          text=text.replace(old,new)
          text=text.replace("item.source==='off'?'Produkt':'Eigene'","item.source==='off'?'Produkt':item.source==='cutcoach'?'Standard':'Eigene'")
          old="$('#nutritionDetailTitle').textContent=item.name;$('#nutritionDetailSource').innerHTML=`<span>${escapeHtml(source)}</span><small>Basis ${fmt(item.amount,item.amount%1?1:0)} ${escapeHtml(item.unit||'g')} · ${coverage}/4 Zusatzwerte vorhanden</small>`;"
          new="$('#nutritionDetailTitle').textContent=item.name;const sourceNode=$('#nutritionDetailSource');sourceNode.dataset.source=item.source||'user';sourceNode.innerHTML=`<span>${escapeHtml(source)}</span><small>Basis ${fmt(item.amount,item.amount%1?1:0)} ${escapeHtml(item.unit||'g')} · ${coverage}/4 Zusatzwerte vorhanden</small>`;"
          if old not in text: raise SystemExit('nutrition-v7 detail source pattern missing')
          text=text.replace(old,new)
          p.write_text(text)

          p=Path('runtime-manifest.js'); text=p.read_text()
          text=text.replace("version:'7.2.0'","version:'7.3.0'")
          text=text.replace("'./nutrition-v7.css?v=7.0.0'","'./nutrition-v7.css?v=7.0.0','./nutrition-v73.css?v=7.3.0'")
          text=text.replace("'./food-catalog.js?v=7.0.0'","'./food-catalog.js?v=7.0.0','./everyday-catalog-v73.js?v=7.3.0'")
          text=text.replace("'./nutrition-v7.js?v=7.0.0'","'./nutrition-v7.js?v=7.0.0','./nutrition-v73.js?v=7.3.0'")
          text=text.replace("'./version-v7.js?v=7.1.0'","'./version-v7.js?v=7.3.0'")
          if "version:'7.3.0'" not in text or 'everyday-catalog-v73.js?v=7.3.0' not in text: raise SystemExit('manifest patch incomplete')
          p.write_text(text)
          replace('sw.js','runtime-manifest.js?v=7.2.0','runtime-manifest.js?v=7.3.0')
          p=Path('update.html'); text=p.read_text().replace('7.2.0','7.3.0').replace('updated=720','updated=730'); p.write_text(text)
          replace('version-v7.js',"const RELEASE='7.2.0'","const RELEASE='7.3.0'")

          package=json.loads(Path('package.json').read_text())
          package['version']='7.3.0'
          package['scripts']['test']='node tests/v7-compat-v73.test.js && node tests/v73-smoke.test.js && node tests/v73-catalog.test.js'
          Path('package.json').write_text(json.dumps(package,ensure_ascii=False,indent=2)+'\n')

          p=Path('.github/workflows/cutcoach-v7-checks.yml')
          text=p.read_text().replace('agent/coach-impulse-v71','agent/german-everyday-catalog-v73')
          p.write_text(text)
          PY
      - name: Install test dependency
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Validate CutCoach 7.3
        run: |
          npm run check:syntax
          npm test
      - name: Commit prepared release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html nutrition.js nutrition-v7.js runtime-manifest.js sw.js update.html version-v7.js package.json package-lock.json .github/workflows/cutcoach-v7-checks.yml
          git commit -m "chore: finalize CutCoach 7.3 release [v73 prepared]"
          git push
