name: Stability Check

on:
  push:
    branches:
      - agent/full-stability-audit
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.matrix.outputs.tests }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Testmatrix erzeugen
        id: matrix
        shell: bash
        run: |
          tests=$(node -e "const fs=require('fs');const fixtures=new Set(['journal-regression.test.js','v72-smoke.test.js','v7-smoke.test.js']);process.stdout.write(JSON.stringify(fs.readdirSync('tests').filter(name=>name.endsWith('.test.js')&&!fixtures.has(name)).sort()))")
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    name: Test ${{ matrix.test }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.discover.outputs.tests) }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Abhängigkeiten installieren
        run: npm install --no-audit --no-fund
      - name: JavaScript-Syntax prüfen
        run: npm run check:syntax
      - name: Test ausführen
        run: node "tests/${{ matrix.test }}"

  suite:
    needs: test
    name: Vollständige Testsuite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Abhängigkeiten installieren
        run: npm install --no-audit --no-fund
      - name: Syntax und vollständige Tests prüfen
        run: npm run check
