<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090d18"><title>CutCoach Sync</title><style>:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#070a12;color:#f7f8fb}main{width:min(440px,100%);padding:26px;border:1px solid #293650;border-radius:26px;background:#111a2b;text-align:center}h1{margin:0 0 10px}p{color:#aeb9ce;line-height:1.5}.icon{font-size:48px}.ok{color:#79e6ad}.bad{color:#ff9aa8}button{width:100%;margin-top:14px;padding:14px;border:0;border-radius:14px;background:linear-gradient(90deg,#7fb4ff,#72e3a6);color:#07121b;font:inherit;font-weight:850}</style></head><body><main><div class="icon">☁️</div><h1 id="title">Schritte werden gespeichert</h1><p id="status">CutCoach verbindet Apple Health mit deiner Home-App …</p><button id="open" hidden>CutCoach öffnen</button></main><script>'use strict';const REST='https://jzaktqzpiqhtjzstprmo.supabase.co/rest/v1',KEY='sb_publishable_XaGAJ421We1klT5HQS7ZVQ_TvbluaPa';const title=document.querySelector('#title'),status=document.querySelector('#status'),open=document.querySelector('#open');const params=new URLSearchParams(location.search);const raw=String(params.get('steps')||'').replace(/[\s.]/g,'').replace(',','.'),steps=Math.round(Number(raw)),sync=String(params.get('sync')||''),day=String(params.get('date')||new Date().toISOString().slice(0,10));open.onclick=()=>location.href='./#today';(async()=>{try{if(!Number.isFinite(steps)||steps<0||steps>100000)throw new Error('Ungültige Schrittzahl');if(!/^[A-Za-z0-9_-]{24,80}$/.test(sync))throw new Error('Persönlicher Sync-Code fehlt');const response=await fetch(REST+'/rpc/cutcoach_upsert_steps',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({p_sync_token:sync,p_day:day,p_steps:steps}),cache:'no-store'});if(!response.ok)throw new Error('Cloud nicht erreichbar');title.textContent='Schritte gespeichert';title.className='ok';status.textContent=new Intl.NumberFormat('de-DE').format(steps)+' Schritte wurden in deiner Health-Cloud gespeichert. Öffne jetzt die CutCoach-Home-App.';open.hidden=false}catch(error){title.textContent='Synchronisierung fehlgeschlagen';title.className='bad';status.textContent=String(error?.message||error);open.hidden=false}})();</script></body></html>
