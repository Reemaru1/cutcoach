<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090d18">
  <title>CutCoach aktualisieren</title>
  <style>
    :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#070a12;color:#f7f8fb}
    main{width:min(460px,100%);padding:24px;border:1px solid #28324a;border-radius:24px;background:#111827;text-align:center}
    .spinner{width:58px;height:58px;margin:0 auto 18px;border:6px solid #28324a;border-top-color:#72e3a6;border-radius:50%;animation:spin .8s linear infinite}
    p{color:#aab4ca;line-height:1.5}.error{color:#ffbdc5}
    button{display:none;width:100%;margin-top:16px;border:0;border-radius:13px;padding:13px;background:linear-gradient(90deg,#7fb4ff,#72e3a6);color:#061018;font:inherit;font-weight:800}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main>
    <div class="spinner" id="spinner"></div>
    <h1>Tagebuch wird aktualisiert</h1>
    <p id="status">CutCoach 1.3.3 Alpha wird geladen. Deine Daten bleiben erhalten.</p>
    <button id="retry">Erneut versuchen</button>
  </main>
  <script>
    'use strict';
    const SERVICE_WORKER_URL='./sw.js';
    const RUNTIME_MANIFEST_URL='./runtime-manifest.js?v=1.3.3-alpha';
    const status=document.querySelector('#status'),retry=document.querySelector('#retry');
    retry.onclick=()=>location.reload();
    async function preflight(){
      if(!navigator.onLine)throw new Error('offline');
      for(const url of [RUNTIME_MANIFEST_URL,SERVICE_WORKER_URL]){const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error(`preflight:${url}:${response.status}`)}
    }
    function waitForInstall(worker){
      if(!worker||worker.state==='installed'||worker.state==='activated')return Promise.resolve();
      return new Promise((resolve,reject)=>{const timeout=setTimeout(()=>reject(new Error('worker-install-timeout')),20000);const changed=()=>{if(worker.state==='installed'||worker.state==='activated'){clearTimeout(timeout);worker.removeEventListener('statechange',changed);resolve()}else if(worker.state==='redundant'){clearTimeout(timeout);worker.removeEventListener('statechange',changed);reject(new Error('worker-redundant'))}};worker.addEventListener('statechange',changed)});
    }
    async function activateUpdate(registration){
      const worker=registration.waiting||registration.installing;
      await waitForInstall(worker);
      const waiting=registration.waiting||(worker?.state==='installed'?worker:null);
      if(!waiting)return;
      const hadController=Boolean(navigator.serviceWorker.controller);
      const changed=hadController?new Promise(resolve=>{const timeout=setTimeout(resolve,8000);navigator.serviceWorker.addEventListener('controllerchange',()=>{clearTimeout(timeout);resolve()},{once:true})}):Promise.resolve();
      waiting.postMessage({type:'SKIP_WAITING'});
      await changed;
    }
    (async()=>{
      try{
        status.textContent='Neue Version wird geprüft …';
        await preflight();
        status.textContent='CutCoach 1.3.3 Alpha wird vorbereitet …';
        if('serviceWorker'in navigator){
          const registration=await navigator.serviceWorker.register(SERVICE_WORKER_URL,{scope:'./',updateViaCache:'none'});
          await registration.update();
          await activateUpdate(registration);
          await navigator.serviceWorker.ready;
        }
        status.textContent='Update erfolgreich. CutCoach wird geöffnet …';
        setTimeout(()=>location.replace('./?updated=133a#today'),900);
      }catch(error){console.error(error);document.querySelector('#spinner').style.display='none';status.className='error';status.textContent=error?.message==='offline'?'Du bist offline. Die bisherige funktionierende Version wurde nicht gelöscht. Stelle eine Internetverbindung her und versuche es erneut.':'Update fehlgeschlagen. Die bisherige funktionierende Version wurde nicht gelöscht. Internetverbindung prüfen und erneut versuchen.';retry.style.display='block'}
    })();
  </script>
</body>
</html>
