<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090d18">
  <title>CutCoach aktualisieren</title>
  <style>
    :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#070a12;color:#f7f8fb}
    main{width:min(460px,100%);padding:24px;border:1px solid #28324a;border-radius:24px;background:#111827;text-align:center}
    .spinner{width:58px;height:58px;margin:0 auto 18px;border:6px solid #28324a;border-top-color:#72e3a6;border-radius:50%;animation:spin .8s linear infinite}
    p{color:#aab4ca;line-height:1.5}.error{color:#ffbdc5}
    button{display:none;width:100%;margin-top:16px;border:0;border-radius:13px;padding:13px;background:linear-gradient(90deg,#7fb4ff,#72e3a6);color:#061018;font:inherit;font-weight:800}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main>
    <div class="spinner" id="spinner"></div>
    <h1>CutCoach wird aktualisiert</h1>
    <p id="status">Die neue Version wird vorbereitet. Deine lokalen Daten und der bisherige Offline-Stand bleiben erhalten.</p>
    <button id="retry">Erneut versuchen</button>
  </main>
  <script>
    'use strict';
    const status=document.querySelector('#status'),retry=document.querySelector('#retry'),wait=milliseconds=>new Promise(resolve=>setTimeout(resolve,milliseconds));
    retry.onclick=()=>location.reload();
    function waitForControllerChange(timeout=7000){return new Promise(resolve=>{let done=false;const finish=()=>{if(done)return;done=true;navigator.serviceWorker?.removeEventListener?.('controllerchange',finish);resolve()};navigator.serviceWorker?.addEventListener?.('controllerchange',finish,{once:true});setTimeout(finish,timeout)})}
    (async()=>{
      try{
        if(!('serviceWorker'in navigator))throw new Error('service-worker-unavailable');
        status.textContent='Neue Offline-Dateien und Suchmodule werden geladen …';
        const hadController=Boolean(navigator.serviceWorker.controller),controllerChange=waitForControllerChange();
        const registration=await navigator.serviceWorker.register('./sw.js?v=1.2.6-alpha-force-stage6',{scope:'./',updateViaCache:'none'});
        await registration.update();
        let worker=registration.waiting||registration.installing;
        if(worker?.state==='installing')await Promise.race([new Promise(resolve=>worker.addEventListener('statechange',()=>{if(worker.state==='installed'||worker.state==='redundant')resolve()},{once:false})),wait(7000)]);
        worker=registration.waiting||worker;
        if(worker?.state==='installed')worker.postMessage({type:'SKIP_WAITING'});
        if(hadController)await controllerChange;else await Promise.race([navigator.serviceWorker.ready,wait(7000)]);
        status.textContent='Update erfolgreich. CutCoach wird geöffnet …';
        setTimeout(()=>location.replace('./?updated=126a-stage6#today'),700);
      }catch(error){console.error(error);document.querySelector('#spinner').style.display='none';status.className='error';status.textContent='Update fehlgeschlagen. Der bisherige Offline-Stand wurde nicht gelöscht. Verbindung prüfen und erneut versuchen.';retry.style.display='block'}
    })();
  </script>
</body>
</html>
