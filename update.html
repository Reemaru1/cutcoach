<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090d18">
  <title>CutCoach aktualisieren</title>
  <style>
    :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#070a12;color:#f7f8fb}
    main{width:min(460px,100%);padding:24px;border:1px solid #28324a;border-radius:24px;background:#111827;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.3)}
    .spinner{width:58px;height:58px;margin:0 auto 18px;border:6px solid #28324a;border-top-color:#72e3a6;border-radius:50%;animation:spin .8s linear infinite}
    h1{margin:0 0 10px;font-size:24px}p{color:#aab4ca;line-height:1.5}.error{color:#ffbdc5}
    button{display:none;width:100%;margin-top:16px;border:0;border-radius:13px;padding:13px;background:linear-gradient(90deg,#7fb4ff,#72e3a6);color:#061018;font:inherit;font-weight:800}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main>
    <div class="spinner" id="spinner"></div>
    <h1>Scanner 2.0 wird installiert</h1>
    <p id="status">Alter CutCoach-Cache wird entfernt. Deine persönlichen Einträge und deine Bibliothek bleiben erhalten.</p>
    <button id="retry" type="button">Erneut versuchen</button>
  </main>
  <script>
    'use strict';
    const status=document.querySelector('#status');
    const retry=document.querySelector('#retry');
    retry.onclick=()=>location.reload();
    async function repair(){
      try{
        if('serviceWorker' in navigator){
          const registrations=await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.filter(reg=>reg.scope.includes('/cutcoach/')).map(reg=>reg.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.filter(key=>key.startsWith('cutcoach-')).map(key=>caches.delete(key)));
        }
        status.textContent='Scanner 2.0 und aktueller Offline-Modus werden installiert …';
        if('serviceWorker' in navigator){
          const registration=await navigator.serviceWorker.register('./sw.js?v=3.1.0-force',{scope:'./',updateViaCache:'none'});
          await registration.update();
          await navigator.serviceWorker.ready;
        }
        status.textContent='Update erfolgreich. CutCoach wird geöffnet …';
        setTimeout(()=>location.replace('./?updated=310#library'),900);
      }catch(error){
        console.error(error);
        document.querySelector('#spinner').style.display='none';
        status.className='error';
        status.textContent='Das Update konnte nicht abgeschlossen werden. Internetverbindung prüfen und erneut versuchen.';
        retry.style.display='block';
      }
    }
    repair();
  </script>
</body>
</html>
