<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#090d18"><title>CutCoach aktualisieren</title><style>:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#070a12;color:#f7f8fb}main{width:min(460px,100%);padding:24px;border:1px solid #28324a;border-radius:24px;background:#111827;text-align:center}.spinner{width:58px;height:58px;margin:0 auto 18px;border:6px solid #28324a;border-top-color:#72e3a6;border-radius:50%;animation:spin .8s linear infinite}p{color:#aab4ca;line-height:1.5}.error{color:#ffbdc5}button{display:none;width:100%;margin-top:16px;border:0;border-radius:13px;padding:13px;background:linear-gradient(90deg,#7fb4ff,#72e3a6);color:#061018;font:inherit;font-weight:800}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><main><div class="spinner" id="spinner"></div><h1>CutCoach 6.0.1 wird installiert</h1><p id="status">Ernährungsheader und Navigation werden vereinheitlicht. Deine Daten bleiben erhalten.</p><button id="retry">Erneut versuchen</button></main><script>'use strict';const status=document.querySelector('#status'),retry=document.querySelector('#retry');retry.onclick=()=>location.reload();(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.filter(r=>r.scope.includes('/cutcoach/')).map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('cutcoach-')).map(k=>caches.delete(k)))}status.textContent='CutCoach 6.0.1 wird geladen …';if('serviceWorker'in navigator){const reg=await navigator.serviceWorker.register('./sw.js?v=6.0.1-force',{scope:'./',updateViaCache:'none'});await reg.update();await navigator.serviceWorker.ready}status.textContent='Update erfolgreich. CutCoach wird geöffnet …';setTimeout(()=>location.replace('./?updated=601#today'),900)}catch(error){console.error(error);document.querySelector('#spinner').style.display='none';status.className='error';status.textContent='Update fehlgeschlagen. Internetverbindung prüfen und erneut versuchen.';retry.style.display='block'}})();</script></body></html>
